name: G39
description: G39 - Workout tracker & gym progress analytics app.
publish_to: 'none'

# 🔥 Build numarasını +25 yaptık.
version: 1.0.0+32

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  timezone: ^0.9.2
  isar: 3.1.0
  isar_flutter_libs: 3.1.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  provider: ^6.1.5+1
  intl: ^0.19.0
  audioplayers: ^5.2.1
  audio_service: ^0.18.15  
  audio_session: ^0.1.25 
  wakelock_plus: ^1.2.8
  flutter_svg: ^2.0.10
  font_awesome_flutter: ^10.7.0
  fl_chart: ^0.68.0
  file_picker: ^8.1.2
  flutter_cube: ^0.1.1
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_messaging: ^16.1.3
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1
  purchases_flutter: ^9.15.1 
  package_info_plus: ^9.0.0
  flutter_local_notifications: ^17.0.0

  # 🔥 PAYLAŞIM VE DEEP LINK PAKETLERİ (YENİ EKLENENLER)
  share_plus: ^10.1.0    # Antrenörün linki paylaşması için
  app_links: ^6.3.2      # g39:// linklerini yakalayıp uygulamayı açmak için
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  isar_generator: 3.1.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/icon/app_icon.png
    - assets/models/
    - assets/models/Untitled.obj

# --- UYGULAMA İKONU (LAUNCHER) ---
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#050816"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true

# --- NATIVE SPLASH ---
flutter_native_splash:
  color: "#050816"
  image: assets/icon/app_icon.png
  android: true
  ios: true
  fullscreen: false
  
  android_12:
    color: "#050816"
    image: assets/icon/app_icon.png
    icon_background_color: "#050816"